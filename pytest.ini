[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:fastapi.*
addopts = -ra --strict-markers
markers =
    snapshot: regression snapshot tests that lock the JSON contract of an endpoint
    security: validation security / attack-fixture tests (must run < 100 ms each)
    bench: performance benchmarks (pytest-benchmark; run with -m bench)
    integration: full-pipeline tests against vendored fixtures
    property: property-based (Hypothesis) tests
