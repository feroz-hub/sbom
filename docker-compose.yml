services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sbom_analyser
      POSTGRES_USER: sbom
      POSTGRES_PASSWORD: sbom
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbom -d sbom_analyser"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
